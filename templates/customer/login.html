<!DOCTYPE html>
<html>
<head><title>Customer Login</title></head>
<body>
  <h1>Customer Login</h1>
  {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
  <p><a href="/internal/login/">Go to Internal User Login</a></p>
</body>
</html>
