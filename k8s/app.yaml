apiVersion: v1
kind: Secret
metadata:
  name: lol-app-secret
type: Opaque
stringData:
  DJANGO_SECRET_KEY: change-me-in-production
  MYSQL_PASSWORD: lolpassword
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lol-app-config
data:
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "*"
  MYSQL_DATABASE: LOLDB
  MYSQL_USER: loluser
  MYSQL_HOST: lol-mysql
  MYSQL_PORT: "3306"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lol-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lol-app
  template:
    metadata:
      labels:
        app: lol-app
    spec:
      containers:
        - name: lol-app
          image: lol-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: lol-app-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lol-app-secret
                  key: DJANGO_SECRET_KEY
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lol-app-secret
                  key: MYSQL_PASSWORD
          command: ["bash", "-lc"]
          args:
            - python manage.py migrate && gunicorn LOL.wsgi:application --bind 0.0.0.0:8000
---
apiVersion: v1
kind: Service
metadata:
  name: lol-app-internal
spec:
  selector:
    app: lol-app
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: lol-app-customer
spec:
  selector:
    app: lol-app
  ports:
    - name: http
      port: 9000
      targetPort: 8000
